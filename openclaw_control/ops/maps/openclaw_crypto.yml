#
# This card complements (does NOT replace) container_map.vps_containers.primary in
# openclaw_control_ops_map.yaml.

card: openclaw_crypto
discovery:
  date: 2026-04-27
  source: phase-0 read-only ssh discovery

services:
  - name: openclaw-orchestrator
    container_name: openclaw-orchestrator
    image: "python:3.13-slim"
    status_at_discovery: "running (Up 18h)"
    restart_policy: unless-stopped
    health: none
    working_dir: /data/.openclaw/workspace/my_openclaw_project
    cmd: null
    entrypoint:
      shell: "/bin/sh -lc"
      script: |
        set -e
        cd /data/.openclaw/workspace/my_openclaw_project
        mkdir -p /tmp/pip-cache
        mkdir -p crypto/data
        if [ ! -x /venv/bin/python3 ]; then
          python3 -m venv /venv
        fi
        /venv/bin/python3 -m pip install --upgrade pip
        /venv/bin/python3 -m pip install -r requirements.txt
        exec /venv/bin/python3 -u -m crypto.orchestrator
    ports: []
    mounts_count: 2
    role: >
      Primary crypto trading orchestrator. Runs `crypto.orchestrator` Python module
      from a mounted source tree under /data/.openclaw/workspace/my_openclaw_project
      inside the container.
    observed_runtime_signals:
      - "regime_detector → TRENDING (trend_strength=0.413, volatility=1.000, btc_direction=BULL)"
      - "scheduler iterates over 662 trading pairs in batches of 25"
      - "moon-v2: 5/5 momentum slots occupied; momentum-only scan running"
      - "6 momentum runners detected 03:36–03:40 UTC on 2026-04-27 (CHIPUSD, HOUSEUSD, PENGUUSD, UMXMUSD, UPUSD, XIONUSD) with entry/stop/tp logged"
    observed_warnings:
      - "`Regime file stale (358s) — using UNCLEAR` (single occurrence; refreshed on next cycle)"

