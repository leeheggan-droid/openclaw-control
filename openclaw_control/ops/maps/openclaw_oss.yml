#
# IMPORTANT: This is the public open-source OpenClaw assistant app, NOT the operator's
# openclaw-crypto trading bot. Different codebases.

card: openclaw_oss
discovery:
  date: 2026-04-27
  source: phase-0 read-only ssh discovery

services:
  - name: openclaw-1ne6-openclaw-cron
    container_name: openclaw-1ne6-openclaw-cron-1
    image: openclaw-1ne6-openclaw-cron
    status_at_discovery: "running (Up 43h)"
    restart_policy: unless-stopped
    health: none
    working_dir: /data
    cmd: ["/etc/crontabs/openclaw"]
    entrypoint: ["/usr/local/bin/supercronic"]
    ports: []
    mounts_count: 6
    role: "Cron sidecar for the upstream OpenClaw assistant."
    observed_runtime_signals:
      - "`process reaping disabled, not pid 1` (warning at start)"
      - "`read crontab: /etc/crontabs/openclaw`"

  - name: openclaw-1ne6-openclaw
    container_name: openclaw-1ne6-openclaw-1
    image: openclaw-1ne6-openclaw
    status_at_discovery: "running (Up 19h)"
    restart_policy: unless-stopped
    health: none
    working_dir: /data
    cmd: ["node", "server.mjs"]
    entrypoint: ["/entrypoint.sh"]
    ports:
      - host: "0.0.0.0:43248"
        container: 43248
        protocol: tcp
    mounts_count: 6
    role: >
      Upstream OpenClaw (Clawdbot/Moltbot lineage) personal AI assistant —
      Node.js multi-provider chat server with Discord and WhatsApp providers.
    observed_runtime_signals:
      - "discord provider logged in as 'Wizard the Lizard' (id 1484202909938745424) in guild 'Wizard lair'"
      - "discord notice: 'Message Content Intent is limited; bots under 100 servers can use it without verification.'"

host:
  compose_files_observed: []  # no compose file matching openclaw-1ne6 was found under /opt /home /srv /root (depth 3)
  source_repo: "upstream OSS — likely github.com/openclaw/openclaw (not in this operator's account)"
  presumed_live_repo_path: "unknown — no .git repo found on disk for this project"
  presumed_live_repo_head: unknown

assumptions:
  - "These containers are the upstream OpenClaw (formerly Moltbot/Clawdbot) self-hosted assistant, NOT openclaw-crypto."
  - "The '1ne6' suffix is a docker-compose project-name hash; not significant beyond uniqueness."

unknowns:
