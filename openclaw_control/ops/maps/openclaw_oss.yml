  - "What are the 6 mounts on each container? `docker inspect openclaw-1ne6-openclaw-1 --format '{{range .Mounts}}{{.Type}}:{{.Source}}->{{.Destination}}; {{end}}'`"
  - "What does the cron schedule? `docker exec openclaw-1ne6-openclaw-cron-1 cat /etc/crontabs/openclaw`"
  - "Is 43248 open to the internet? `ss -tlnp | grep 43248` and `iptables -L INPUT -n | grep 43248` (latter requires sudo)"
