# OpenClaw Control — Repository & Operations Map
# Machine-readable core memory for Vibe planner, Autopilot, and Team Review agents.
# NO secrets. This is a structural/contract map only.
# Source of truth: leeheggan-droid/openclaw-control

system_overview:
  description: >
    OpenClaw Control is a Python/FastAPI cockpit for the OpenClaw crypto trading bot.
    It runs on the operator's machine and reaches the trading server (VPS) via SSH only.
    It does NOT trade directly — all trading is performed by leeheggan-droid/openclaw-crypto
    on the VPS at OPENCLAW_REPO_DIR (default /opt/openclaw-crypto).
  responsibilities:
    - "Browser-based multi-agent chat cockpit for inspecting and debugging the trading bot."
    - "Route operator questions to specialist AI agents (Main, P&L, Quant, COO)."
    - "Autopilot: scheduled SSH health checks + escalation via GitHub issues or Vibe commands."
    - "Vibe Execution Gateway: gate all mutative VPS operations behind mandatory human approval."
    - "Track daily OpenAI API spend ($4=low, $5=exhausted) and degrade gracefully."
  vps_defaults:
    ssh_host_env: "OPENCLAW_SSH_HOST"
    repo_dir_env: "OPENCLAW_REPO_DIR"
    repo_dir_default: "/opt/openclaw-crypto"
  in_scope_for_agents:
    - "Read-only SSH inspection (docker ps, docker logs, git log, find, grep)"
    - "AI analysis of log data, P&L, Quant critique, and system state"
    - "Generating (but not executing without approval) Vibe commands and GitHub issues"
  out_of_scope_for_agents:
    - "Executing mutative VPS commands without operator approval"
    - "Trading decisions or sending orders to any exchange"
    - "Accessing or logging API keys or secrets"

repository_structure:
  entrypoints:
    web_server: "uvicorn web_app:app --reload"
    tui: "python main.py"
  key_files:
    web_app.py: "FastAPI server — all REST endpoints and browser cockpit HTML/JS"
    openclaw_control/service.py: "Business logic — SSH execution, agent dispatch, team review, autopilot, Vibe gateway"
    openclaw_control/config.py: "Settings dataclass — reads all env vars from .env"
    openclaw_control/budget.py: "Thread-safe daily spend tracker (in-memory, resets on restart)"
    openclaw_control/agents/: "Agent definitions (instructions + model settings, no state)"
    openclaw_control/tools/ssh_tools.py: "subprocess SSH wrapper (BatchMode=yes, ConnectTimeout=5, timeout=10s)"
    openclaw_control/ops/map_loader.py: "Ops map loader — loads this file, provides compressed summary"
  config_keys:
    OPENAI_API_KEY: "OpenAI API key for all Agents SDK calls"
    OPENCLAW_SSH_HOST: "VPS SSH target (user@host)"
    OPENCLAW_REPO_DIR: "Absolute path to trading bot repo on VPS"
    GITHUB_TOKEN: "GitHub PAT for auto issue creation (optional)"
    GITHUB_REPO: "Default GitHub repo for autopilot issues"
    OPENCLAW_AUTOPILOT_INTERVAL: "Seconds between autopilot cycles (default 300)"
  persistence_note: >
    All state (budget, autopilot findings, team-review results, Vibe run status) is
    in-memory only. Everything is lost on process restart. Agent sessions are stored
    in SQLite via the Agents SDK (openclaw_*_session tables).

container_map:
  control_panel:
    name: "openclaw-control (uvicorn process)"
    type: "OS process — not containerised"
    log_location: "stdout/stderr of uvicorn (no file logging by default)"
    limitations:
      - "No persistent log file — logs lost on restart unless redirected."
      - "In-memory budget counter resets on restart."
  vps_containers:
    primary:
      name: "openclaw-orchestrator"
      type: "Docker container on VPS"
      role: "Primary trading bot — orchestration and trade execution"
      log_commands:
        tail_500: "docker logs --tail=500 openclaw-orchestrator 2>&1"
        stream: "docker logs -f openclaw-orchestrator 2>&1"
        keyword_grep: "docker logs --tail=500 openclaw-orchestrator 2>&1 | grep -iE 'HALT|error|pnl|trade|signal|warning' | tail -20"
      log_answers:
        - "HALT/HALTED state (keyword: HALT, HALTED)"
        - "Trade signals and execution (keyword: trade, signal, executed, filled)"
        - "P&L snapshots if logged (keyword: pnl, sharpe, drawdown, equity)"
        - "Runtime exceptions (keyword: error, exception)"
        - "Risk/safety state (keyword: risk, drawdown, multiplier, bear)"
      limitations:
        - "Logs only available since container last started — no persistent store."
        - "Container name 'openclaw-orchestrator' is hardcoded — must match actual name."
      inspect_command: "docker inspect openclaw-orchestrator --format '{{.Name}} status={{.State.Status}} started={{.State.StartedAt}} restarts={{.RestartCount}}' 2>/dev/null"
    discovery: "docker ps --format 'table {{.Names}}\\t{{.Status}}\\t{{.State}}' 2>/dev/null"

data_location_map:
  note: >
    The control-panel (openclaw-control) maintains a LOCAL persistent SQLite trade log
    (.openclaw_trades.sqlite) populated when the trading bot POSTs to /trades/log and /pnl/log.
    Query this log via GET /trades?limit=N or GET /pnl?limit=N, or through the agent's
    get_trade_history / get_pnl_history tools.
    If the bot has not been configured to POST to the control-panel endpoints, this log will
    be empty — use docker logs on the VPS instead.
    All VPS-side trading data lives in container logs; it is NOT persisted to files on the VPS.
    Absence of data in VPS logs means the bot has not emitted the relevant log lines since
    the last container start, or uses different log keywords than those searched.
  report_commands:
    container_health:
      description: "Is the trading container running? Any restarts?"
      commands:
        - "docker ps --format 'table {{.Names}}\\t{{.Status}}\\t{{.State}}' 2>/dev/null"
        - "docker inspect openclaw-orchestrator --format '{{.Name}} status={{.State.Status}} started={{.State.StartedAt}} restarts={{.RestartCount}}' 2>/dev/null || echo '[container not found]'"
      absence_means: "Container is not running or named differently from 'openclaw-orchestrator'."
    last_trade:
      description: "Most recent trade executed by the bot."
      commands:
        - "docker logs --tail=5000 openclaw-orchestrator 2>&1 | grep -iE 'placed|order_id|fill|filled|fill_price|executed|BUY|SELL|signal_triggered' | tail -20"
        - "docker logs --tail=5000 alpaca_orb_bite_bot 2>&1 | grep -iE 'placed|order_id|fill|filled|fill_price|executed|BUY|SELL' | tail -20"
        - "find /opt/openclaw-crypto -name '*.log' 2>/dev/null | xargs grep -l 'trade\\|fill\\|executed' 2>/dev/null | head -3"
        - "find /opt/openclaw-crypto -name '*.db' -o -name '*.sqlite' 2>/dev/null | head -3"
      absence_means: >
        Bot has not logged any trade since container last started, or uses different log keywords.
        NOTE: The control-panel's local trade log is checked automatically by run_vibe_report
        before SSH commands — use GET /trades or the get_trade_history agent tool for local data.
    trade_history_7d:
      description: "Trade history for the last 7 days (or as far back as logs go)."
      commands:
        - "docker logs --tail=5000 openclaw-orchestrator 2>&1 | grep -iE 'placed|order_id|fill|filled|fill_price|executed|BUY|SELL|signal_triggered' | tail -100"
        - "docker logs --tail=5000 alpaca_orb_bite_bot 2>&1 | grep -iE 'placed|order_id|fill|filled|fill_price|executed|BUY|SELL' | tail -100"
        - "find /opt/openclaw-crypto -name '*.db' -o -name '*.csv' 2>/dev/null | head -5"
        - "find /opt/openclaw-crypto -name 'trades*' -o -name 'history*' 2>/dev/null | head -5"
      absence_means: >
        No persistent trade store on VPS; history limited to current container log window.
        NOTE: The control-panel's local trade log (GET /trades) may have more history
        if the bot has been configured to POST to /trades/log.
    pnl_snapshot:
      description: "Current P&L, equity, drawdown, and performance metrics."
      commands:
        - "docker logs --tail=500 openclaw-orchestrator 2>&1 | grep -iE 'pnl|sharpe|drawdown|equity' | tail -30"
        - "docker logs --tail=500 alpaca_orb_bite_bot 2>&1 | grep -iE 'pnl|sharpe|drawdown|equity' | tail -30"
        - "find /opt/openclaw-crypto -name 'pnl*' -o -name 'performance*' 2>/dev/null | head -5"
        - "find /opt/openclaw-crypto -name '*.json' 2>/dev/null | xargs grep -l 'pnl' 2>/dev/null | head -3"
      absence_means: "Bot does not persist P&L to file; only available in container stdout since last restart."
    halt_status:
      description: "Is the bot halted? When did it halt? What triggered it?"
      commands:
        - "docker logs --tail=200 openclaw-orchestrator 2>&1 | grep -iE 'HALT|HALTED|risk|bypass|multiplier' | tail -20"
        - "docker inspect openclaw-orchestrator --format '{{.State.Status}}' 2>/dev/null || echo '[container not found]'"
        - "grep -RIn 'HALT\\|halt_state\\|is_halted' /opt/openclaw-crypto 2>/dev/null | head -10"
      absence_means: "System not halted, or halt state not persisted to disk (in-memory only)."
  inspection_priority:
    - "1. docker logs --tail=500 (fastest — current runtime state)"
    - "2. docker ps (confirm container is running)"
    - "3. docker inspect (start time, restart count)"
    - "4. find /opt/openclaw-crypto for log/db/csv files"
    - "5. grep -RIn across codebase (slowest — static analysis)"

vibe_capability_contract:
  vibe_may_do_autonomously:
    - "Read-only SSH: docker ps, docker logs (tail/grep), uptime, df, free"
    - "Read-only file inspection: cat, grep, find (no -delete or -exec rm)"
    - "git log, git status, git diff (read-only)"
    - "Evidence gathering for Autopilot investigate cycles"
    - "Planning shell commands (JSON output) without executing them"
    - "Opening GitHub issues in ALLOWED_REPOS for code/config anomalies"
  vibe_must_never_do_without_operator_approval:
    - "Execute mutative VPS commands (docker restart, docker compose up/down, systemctl)"
    - "Modify, delete, or create files on VPS"
    - "Run 'vibe' CLI or any code-generation tool on VPS"
    - "Change environment variables or .env files"
    - "Push git commits to any branch"
    - "Trigger any trade, order, or position change on any exchange"
    - "Access, print, or log API keys or secrets"
  approval_gate:
    endpoint: "POST /vibe/execute"
    flow: "Plan → operator approves UI banner → Confirm → SSH execute"
    shell_injection_guard: "workdir and prompt are shlex.quote'd before SSH"

agent_behavior_rules:
  global_rules:
    - "ALL agents MUST attempt Vibe/SSH data requests before asking the operator for information."
    - "ALL agents MUST wait for Vibe/SSH results before performing analysis."
    - "ALL agents MUST explicitly state 'no data found' when SSH returns empty or error."
    - "NO agent may ask the operator to paste logs, switch tabs, or relay data manually."
    - "NO agent may fabricate or estimate numbers without labelling them as estimates."
    - "When data is needed: emit VIBE_REPORT_REQUEST: <report_id> and wait for results."
    - "Valid report_ids: container_health, last_trade, trade_history_7d, pnl_snapshot, halt_status"
  main_agent:
    role: "Intelligent orchestrator — calls specialist agents and web search on demand; never redirects user to another tab."
    tools: "ask_pnl (delegates to P&L agent), ask_quant (delegates to Quant agent), web_search (Brave API)"
    vibe_instruction: "Emit VIBE_REPORT_REQUEST: <report_id> to fetch live data before answering."
    budget_rule: "Unbounded — no budget-driven changes."
  pnl_agent:
    role: "Net P&L, fees, slippage, trade attribution."
    vibe_instruction: "Request pnl_snapshot and trade_history_7d before any P&L analysis."
    budget_rule: "Trims output when [BUDGET LOW] prefix present."
  quant_agent:
    role: "Statistical rigour, backtesting, bot engineering quality."
    vibe_instruction: "Request container_health and relevant data before statistical analysis."
    budget_rule: "Trims output when [BUDGET LOW] prefix present."
  coo_agent:
    role: "Orchestrator — synthesises P&L + Quant into decision memos."
    vibe_instruction: "Use workspace context + ops map. Do not ask operator for logs."
    budget_rule: "Refuses orchestration when budget is low."
  vibe_planner:
    role: "Generates VPS shell commands from goals. Uses data_location_map commands exactly."
    constraint: "Output ONLY the JSON object. Commands must match ops map paths."

known_limitations:
  local_trade_log_requires_bot_posting:
    summary: "The control-panel SQLite trade log is only populated when the bot POSTs to /trades/log and /pnl/log."
    impact: "If the bot has not been configured to report to these endpoints, GET /trades returns empty and all local trade history is unavailable. Use docker logs on the VPS as the fallback."
  no_pnl_exporter:
    summary: "No file-based P&L exporter exists."
    impact: "P&L only in container stdout since last restart; historical P&L irrecoverable."
  logs_only_since_last_start:
    summary: "docker logs only returns output since last container start."
    impact: "Historical trades and HALT events before last restart are not accessible."
  ssh_timeout_constraint:
    summary: "All SSH calls: ConnectTimeout=5s, subprocess timeout=10-20s."
    impact: "Slow VPS or network issues produce SSH errors, not data. Absence != no events."
  container_name_hardcoded:
    summary: "Container name 'openclaw-orchestrator' is hardcoded in service.py."
    impact: "If actual name differs, all log probes return '[no openclaw-orchestrator container]'."
  no_trade_state:
    summary: "No knowledge of open positions, pending orders, or market exposure."
    impact: "Live position sizes and unrealised P&L only available from Alpaca API or bot logs."
  budget_resets_on_restart:
    summary: "Daily spend counter is in-memory. Resets to $0 on process restart."
    impact: "Control panel restart may allow agents to run past the true daily limit."
  no_authentication:
    summary: "FastAPI app has no built-in authentication."
    impact: "Anyone with network access can execute approved Vibe commands. Use reverse proxy."
  stateless_ssh_sessions:
    summary: "Each SSH call is a fresh subprocess — no persistent shell session."
    impact: "Commands depending on prior shell state (exported vars, cd without &&) will fail."
