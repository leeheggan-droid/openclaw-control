# OpenClaw cockpit — VPS compose file (Traefik edition)
# Deploy with:
#   docker compose -f docker-compose.cockpit.yml up -d --build
#
# Prerequisites on the VPS:
#   /etc/openclaw-control.env  — environment file with API keys and SSH config
#   SSH keys for OPENCLAW_SSH_HOST / OPENCLAW_SSH_READONLY_HOST accessible to
#   the container (mounted as a read-only volume below).
#   .env file (same directory) containing: ACME_EMAIL=<your-email>
#
# Traefik handles TLS termination and obtains Let's Encrypt certificates
# automatically via HTTP-01 challenge.  Both leeheggan.tech and
# www.leeheggan.tech are covered by a single SAN certificate.
#
# Router names are prefixed with "cockpit-" to avoid collisions with other
# containers that may also be managed by the same Traefik instance.

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=web
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL must be set in .env}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  openclaw-cockpit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-cockpit
    restart: unless-stopped
    # Traefik routes to this container internally; no public port binding needed.
    expose:
      - "8001"
    env_file: /etc/openclaw-control.env
    volumes:
      # Mount the SSH config and keys from the host so the container can reach
      # OPENCLAW_SSH_HOST and OPENCLAW_SSH_READONLY_HOST.
      - /root/.ssh:/root/.ssh:ro
      # Persist SQLite session databases between restarts.
      - cockpit_data:/app/data
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    labels:
      - "traefik.enable=true"

      # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
      # Both the apex and www must be matched here so Traefik can serve the
      # ACME HTTP-01 challenge token for each name before redirecting.
      - "traefik.http.routers.cockpit-http.rule=Host(`leeheggan.tech`) || Host(`www.leeheggan.tech`)"
      - "traefik.http.routers.cockpit-http.entrypoints=web"
      - "traefik.http.routers.cockpit-http.middlewares=cockpit-https-redirect"
      - "traefik.http.middlewares.cockpit-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.cockpit-https-redirect.redirectscheme.permanent=true"

      # ── HTTPS router ──────────────────────────────────────────────────────
      - "traefik.http.routers.cockpit-secure.rule=Host(`leeheggan.tech`) || Host(`www.leeheggan.tech`)"
      - "traefik.http.routers.cockpit-secure.entrypoints=websecure"
      - "traefik.http.routers.cockpit-secure.tls=true"
      - "traefik.http.routers.cockpit-secure.tls.certresolver=letsencrypt"
      # Request a single cert with www as the main name and the apex as a SAN
      # so both names are covered without issuing two separate certificates.
      - "traefik.http.routers.cockpit-secure.tls.domains[0].main=www.leeheggan.tech"
      - "traefik.http.routers.cockpit-secure.tls.domains[0].sans=leeheggan.tech"

      # ── Backend service ───────────────────────────────────────────────────
      - "traefik.http.services.cockpit-svc.loadbalancer.server.port=8001"
      - "traefik.http.routers.cockpit-http.service=cockpit-svc"
      - "traefik.http.routers.cockpit-secure.service=cockpit-svc"

volumes:
  cockpit_data:
  traefik-letsencrypt:

networks:
  web:
    name: web
