---
# status-all.yml — one-line systemctl status for every systemd bot on the VPS.
# Safe read-only check; this is the default action (no tag required).
# Services covered:
#   openclaw-agent.service   — GitHub Issue Polling Agent (NOT Docker)
#   openclaw-crypto.service  — Kraken crypto trading bot (REAL GBP)
#   alpaca_orb_bite_bot      — Alpaca paper trading bot
#   linkedin-news.timer      — LinkedIn DC news bot (systemd timer)
- hosts: vps
  tasks:
    - name: openclaw-agent.service
      command: systemctl status openclaw-agent.service --no-pager
      register: agent_status
      failed_when: false

    - name: openclaw-crypto.service
      command: systemctl status openclaw-crypto.service --no-pager
      register: crypto_status
      failed_when: false

    - name: alpaca_orb_bite_bot.service
      command: systemctl status alpaca_orb_bite_bot.service --no-pager
      register: alpaca_status
      failed_when: false

    - name: linkedin-news.timer
      command: systemctl status linkedin-news.timer --no-pager
      register: linkedin_status
      failed_when: false

    - name: Show service status
      debug:
        msg:
          - "{{ agent_status.stdout_lines }}"
          - "{{ crypto_status.stdout_lines }}"
          - "{{ alpaca_status.stdout_lines }}"
          - "{{ linkedin_status.stdout_lines }}"
