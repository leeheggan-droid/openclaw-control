---
- name: Full server status — all systemd bots
  hosts: vps
  tasks:
    - name: openclaw-agent systemd status
      command: systemctl status openclaw-agent.service --no-pager
      register: agent_status
      ignore_errors: true
    - debug:
        var: agent_status.stdout_lines

    - name: openclaw-crypto systemd status
      command: systemctl status openclaw-crypto.service --no-pager
      register: crypto_status
      ignore_errors: true
    - debug:
        var: crypto_status.stdout_lines

    - name: alpaca_orb_bite_bot systemd status
      command: systemctl status alpaca_orb_bite_bot.service --no-pager
      register: alpaca_status
      ignore_errors: true
    - debug:
        var: alpaca_status.stdout_lines

    - name: linkedin-news timer status
      command: systemctl status linkedin-news.timer --no-pager
      register: linkedin_status
      ignore_errors: true
    - debug:
        var: linkedin_status.stdout_lines
