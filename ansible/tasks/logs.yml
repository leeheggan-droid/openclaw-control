---
- name: Logs — Openclaw Docker containers
  hosts: vps
  tasks:
    - name: openclaw app logs
      command: docker logs openclaw-1ne6-openclaw-1 --tail 50
      register: app_logs
    - debug:
        var: app_logs.stdout_lines

    - name: openclaw cron logs
      command: docker logs openclaw-1ne6-openclaw-cron-1 --tail 20
      register: cron_logs
    - debug:
        var: cron_logs.stdout_lines
