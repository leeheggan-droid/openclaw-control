---
# logs-systemd.yml — fetch journald logs for a single specified service.
# Variables:
#   service      — systemd unit name, e.g. "openclaw-agent.service" (default: crypto-bot)
#   tail_lines   — number of log lines to fetch (default: 50)
# Triggered by the "logs-systemd" tag. Pass via:
#   -e "service=openclaw-agent.service" -e "tail_lines=30"
# or via the GitHub Actions `service` and `tail_lines` workflow inputs.

- name: List systemd services matching pattern
  ansible.builtin.shell:
    cmd: "systemctl list-units --type=service --state=loaded --no-pager --no-legend | grep -i '{{ service_pattern | default(\"crypto\") }}'"
  register: service_list
  changed_when: false
  failed_when: false

- name: Show matching services
  ansible.builtin.debug:
    msg: "{{ service_list.stdout }}"

- name: Fetch journalctl logs for service
  ansible.builtin.command:
    cmd: "journalctl -u {{ service | default('crypto-bot') }} --no-pager -n {{ tail_lines | default('50') }}"
  register: journal_output
  changed_when: false

- name: Show logs
  ansible.builtin.debug:
    msg: "{{ journal_output.stdout }}"
