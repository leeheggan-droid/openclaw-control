---
- name: Deploy — pull latest and restart Docker stack
  hosts: vps
  tasks:
    - name: Git pull latest
      git:
        repo: https://github.com/leeheggan-droid/openclaw-control.git
        dest: /home/jacks/openclaw-control
        version: main
        force: yes

    - name: Docker compose build
      command: docker compose build
      args:
        chdir: "{{ docker_compose_dir }}"

    - name: Docker compose up
      command: docker compose up -d
      args:
        chdir: "{{ docker_compose_dir }}"
