---
- name: Logs — all systemd bots
  hosts: vps
  tasks:
    - name: openclaw-crypto logs
      command: journalctl -u openclaw-crypto.service --no-pager -n {{ tail_lines | default(50) }}
      register: r1
    - debug:
        var: r1.stdout_lines

    - name: alpaca_orb_bite_bot logs
      command: journalctl -u alpaca_orb_bite_bot.service --no-pager -n {{ tail_lines | default(50) }}
      register: r2
    - debug:
        var: r2.stdout_lines

    - name: linkedin-news logs
      command: journalctl -u linkedin-news.service --no-pager -n {{ tail_lines | default(50) }}
      register: r3
    - debug:
        var: r3.stdout_lines
