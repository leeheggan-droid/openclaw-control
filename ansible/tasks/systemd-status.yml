# =============================================================================
# tasks/systemd-status.yml — Show status of a systemd-managed service
# =============================================================================
# Called by site.yml when service != "docker" and action=status.
# Requires the `systemd_unit` variable to be set by site.yml.
# =============================================================================

---
- name: Show systemd service status
  ansible.builtin.command:
    cmd: systemctl status {{ systemd_unit | quote }} --no-pager
  register: service_status
  changed_when: false
  # systemctl status returns non-zero if the unit is stopped/failed, so we
  # capture that output rather than letting Ansible abort the play.
  failed_when: false

- name: Display service status
  ansible.builtin.debug:
    msg: "{{ service_status.stdout_lines }}"
