---
# systemd-status.yml — detailed systemctl status for all systemd bots.
# Safe read-only. Shows active state, PID, recent log lines, and resource usage.
# Services covered:
#   openclaw-agent   — GitHub Issue Polling Agent (NOT Docker)
#   openclaw-crypto  — Kraken crypto bot (REAL GBP)
#   alpaca_orb_bite_bot — Alpaca paper trading bot
#   linkedin-news timer — LinkedIn DC news bot (systemd timer)
- name: Status — all systemd bots
  hosts: vps
  tasks:
    - name: openclaw-agent
      command: systemctl status openclaw-agent.service --no-pager
      register: r0
      ignore_errors: true
    - debug:
        var: r0.stdout_lines

    - name: openclaw-crypto
      command: systemctl status openclaw-crypto.service --no-pager
      register: r1
      ignore_errors: true
    - debug:
        var: r1.stdout_lines

    - name: alpaca_orb_bite_bot
      command: systemctl status alpaca_orb_bite_bot.service --no-pager
      register: r2
      ignore_errors: true
    - debug:
        var: r2.stdout_lines

    - name: linkedin-news timer
      command: systemctl status linkedin-news.timer --no-pager
      register: r3
      ignore_errors: true
    - debug:
        var: r3.stdout_lines
