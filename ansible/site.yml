---
# openclaw-control — main site playbook
# Usage: ansible-playbook -i ansible/inventory ansible/site.yml --tags <tag>

- import_playbook: tasks/status-all.yml
  tags: [status-all]

- import_playbook: tasks/systemd-status.yml
  tags: [systemd-status]

- import_playbook: tasks/systemd-restart.yml
  tags: [systemd-restart]

- import_playbook: tasks/systemd-stop.yml
  tags: [systemd-stop]

- import_playbook: tasks/systemd-start.yml
  tags: [systemd-start]

- import_playbook: tasks/systemd-logs.yml
  tags: [systemd-logs]

- import_playbook: tasks/deploy.yml
  tags: [deploy]

- name: Fetch systemd service logs (journalctl)
  hosts: vps
  tasks:
    - ansible.builtin.import_tasks: tasks/logs-systemd.yml
  tags: [logs-systemd]
