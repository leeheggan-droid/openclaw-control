plan:
  name: Claude VPS Plan
  version: "1.0"
  goal: >
    Wire Claude (Anthropic LLM) into the openclaw-agent running on the VPS so that it
    generates pre-approval issue plans, then execute approved actions via the Vibe
    Execution Gateway — all within a strictly allowlisted safety model.

components:
  - name: openclaw-agent
    runs_where: vps
    responsibilities:
      - Poll GitHub issues labelled agent:queue
      - Call the configured LLM provider (Claude / Gemini / Groq) to generate a plan
      - Post the plan as an issue comment and label the issue agent:needs-approval
      - On /approve comment, execute approved ops via the Vibe gateway
      - Label the issue agent:done and open a result PR
    inputs:
      - GitHub issue body and labels
      - LLM provider response
      - Vibe gateway responses
    outputs:
      - GitHub issue comments (plan, results)
      - GitHub PRs (run artifacts)
      - GitHub label transitions
    secrets_needed:
      - ANTHROPIC_API_KEY
      - GITHUB_TOKEN
      - VIBE_API_KEY

  - name: claude-llm
    runs_where: anthropic_cloud
    responsibilities:
      - Receive the issue prompt from the VPS agent
      - Return a structured pre-approval plan (markdown) or JSON ops list after approval
    inputs:
      - Issue body, title, and context provided by the VPS agent
    outputs:
      - Pre-approval plan markdown
      - (Post-approval) JSON ops actions list
    secrets_needed: []

  - name: vibe-execution-gateway
    runs_where: vps
    responsibilities:
      - Accept structured action requests from openclaw-agent
      - Execute allowlisted systemd / shell / file operations on the VPS
      - Return stdout, stderr, and exit status
    inputs:
      - JSON action objects from openclaw-agent
    outputs:
      - JSON result objects (stdout, stderr, exit_code)
    secrets_needed:
      - VIBE_API_KEY

  - name: github-integration
    runs_where: github
    responsibilities:
      - Host the issue queue (label agent:queue)
      - Receive /approve comments and relay label state
      - Receive PR artifacts from the agent
    inputs:
      - User issue comments and label changes
    outputs:
      - Webhook events (label:created, issue_comment)
    secrets_needed: []

control_flow:
  - step: 1
    trigger: "Issue labelled agent:queue"
    actor: openclaw-agent (VPS)
    action: >
      Fetch issue body and title; build a planning prompt; call LLM provider
      (Claude when LLM_PROVIDER=anthropic).
    security_gate: none — read-only GitHub API call + outbound HTTPS to LLM
    artifacts_created:
      - LLM plan text (in memory)

  - step: 2
    trigger: LLM plan returned
    actor: openclaw-agent (VPS)
    action: >
      Post plan as issue comment. Remove agent:queue label; add
      agent:needs-approval and agent:working.
    security_gate: GITHUB_TOKEN write scope limited to issues/labels in one repo
    artifacts_created:
      - GitHub issue comment (plan)

  - step: 3
    trigger: "User comments /approve on the issue"
    actor: openclaw-agent (VPS)
    action: >
      Call LLM a second time asking for JSON ops list; validate JSON against
      allowlist; send each action to the Vibe gateway; collect results.
    security_gate: >
      Ops list validated against VIBE_ALLOWLIST before any Vibe call is made.
      Unknown action types are rejected without execution.
    artifacts_created:
      - Execution results (stdout/stderr per action)

  - step: 4
    trigger: All ops complete (or error)
    actor: openclaw-agent (VPS)
    action: >
      Post execution results to issue as a comment; create a run-artifact PR;
      remove agent:working / agent:needs-approval; add agent:done.
    security_gate: GITHUB_TOKEN write scope (PRs + labels)
    artifacts_created:
      - GitHub PR (run artifact)
      - GitHub issue comment (results)

configuration:
  env_file: /etc/openclaw-agent/config.env
  required_vars:
    LLM_PROVIDER: "anthropic"
    ANTHROPIC_API_KEY: "<redacted — never commit>"
    ANTHROPIC_MODEL: "claude-3-haiku-20240307"
    GITHUB_TOKEN: "<redacted — never commit>"
    GITHUB_REPO: "leeheggan-droid/openclaw-control"
    VIBE_API_BASE: "http://127.0.0.1:<PORT>"
    VIBE_API_KEY: "<redacted — never commit>"
    VIBE_ALLOWLIST: "restart_service:openclaw-agent.service,tail_journal:openclaw-agent.service"
  optional_vars:
    GEMINI_API_KEY: "<fallback if LLM_PROVIDER=gemini>"
    GROQ_API_KEY: "<fallback if LLM_PROVIDER=groq>"
    POLL_INTERVAL_SECONDS: "30"

safety_model:
  principles:
    - The VPS agent never executes shell commands directly; all ops go through Vibe.
    - Every Vibe action must match an entry in VIBE_ALLOWLIST before execution.
    - Secrets are stored only in /etc/openclaw-agent/config.env (chmod 600, root-owned).
    - No secrets are committed to source control.
    - /approve is the only trigger for execution; plans are read-only and never auto-executed.
    - All LLM calls are logged to the issue thread; nothing happens silently.
  forbidden:
    - Arbitrary shell command execution (no exec/eval/shell=True without allowlist)
    - Writing to paths outside the explicitly allowlisted write paths
    - Restarting systemd units not in VIBE_ALLOWLIST
    - Auto-approving issues without a human /approve comment
    - Storing or echoing secrets in issue comments, logs, or PR bodies
  audit_logging:
    - Every Vibe call and its result is posted as an issue comment
    - Agent startup/shutdown is logged to journald (journalctl -u openclaw-agent)
    - LLM provider, model, and token counts are logged per request

next_steps:
  - Add anthropic_plan() function to agent.py (alongside gemini_plan/groq_plan)
  - Route LLM_PROVIDER=anthropic to anthropic_plan() inside llm_plan()
  - Add vibe_client.py (or inline) with vibe_call(action) -> result
  - Update the post-approval prompt to request JSON ops list (not prose)
  - Validate ops list against VIBE_ALLOWLIST before sending to Vibe
  - Test end-to-end with a safe test issue (e.g. tail_journal)
  - Confirm Anthropic model entitlement on VPS with a curl health-check
  - Consider Bedrock/Vertex as fallback if Anthropic direct 404s persist
