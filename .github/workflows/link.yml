name: Link Control

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Action to run'
        required: true
        default: 'status-all'
        type: choice
        options:
          - status-all
          - systemd-status
          - systemd-logs
          - systemd-restart
          - logs-systemd
      service:
        description: 'Systemd service name (for logs-systemd task)'
        required: false
        default: 'crypto-bot'
      tail_lines:
        description: 'Number of log lines to fetch (systemd-logs task only)'
        required: false
        default: '50'

jobs:
  run:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run playbook — ${{ inputs.task }}
        run: |
          ansible-playbook -i ansible/inventory ansible/site.yml \
            --tags "${{ inputs.task }}" \
            -e "service=${{ inputs.service }}" \
            -e "tail_lines=${{ inputs.tail_lines }}"
