name: Link Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Canonical action input'
        required: false
        type: choice
        options:
          - status-all
          - systemd-status
          - systemd-logs
          - systemd-restart
          - systemd-stop
          - systemd-start
          - logs-systemd
          - deploy
      task:
        description: 'Legacy compatibility input (use action when possible)'
        required: false
        type: string
      service:
        description: 'Systemd unit name — required for systemd-stop, systemd-start, logs-systemd, deploy (e.g. alpaca_orb_bite_bot.service)'
        required: false
        default: ''
      tail_lines:
        description: 'Number of log lines to fetch (systemd-logs and logs-systemd only)'
        required: false
        default: '50'

permissions:
  contents: read

env:
  VPS_IP: '72.61.123.4'

jobs:
  run:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install --break-system-packages ansible

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts

      - name: Write inventory
        run: echo "${{ secrets.ANSIBLE_INVENTORY }}" > ansible/inventory.ini

      - name: Resolve and validate workflow inputs
        run: |
          ACTION_INPUT='${{ inputs.action }}'
          TASK_INPUT='${{ inputs.task }}'

          if [ -n "$ACTION_INPUT" ] && [ -n "$TASK_INPUT" ] && [ "$ACTION_INPUT" != "$TASK_INPUT" ]; then
            echo "ERROR: inputs.action and inputs.task conflict ('$ACTION_INPUT' vs '$TASK_INPUT')."
            exit 1
          fi

          EFFECTIVE_ACTION="$ACTION_INPUT"
          if [ -z "$EFFECTIVE_ACTION" ]; then
            EFFECTIVE_ACTION="$TASK_INPUT"
          fi

          if [ -z "$EFFECTIVE_ACTION" ]; then
            echo "ERROR: Provide one of inputs.action or inputs.task."
            exit 1
          fi

          case "$EFFECTIVE_ACTION" in
            status-all|systemd-status|systemd-logs|systemd-restart|systemd-stop|systemd-start|logs-systemd|deploy)
              ;;
            *)
              echo "ERROR: Unsupported action '$EFFECTIVE_ACTION'."
              exit 1
              ;;
          esac

          case "$EFFECTIVE_ACTION" in
            systemd-stop|systemd-start|logs-systemd|deploy)
              if [ -z "${{ inputs.service }}" ]; then
                echo "ERROR: 'service' input is required for action '$EFFECTIVE_ACTION'."
                exit 1
              fi
              ;;
          esac

          echo "effective_action=$EFFECTIVE_ACTION" >> "$GITHUB_ENV"

      - name: Run playbook — ${{ env.effective_action }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml \
            --tags "${{ env.effective_action }}" \
            -e "service=${{ inputs.service }}" \
            -e "tail_lines=${{ inputs.tail_lines }}"
