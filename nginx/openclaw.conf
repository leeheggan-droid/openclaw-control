# nginx reverse-proxy config for OpenClaw at www.leeheggan.tech
#
# This file assumes:
#   - Certbot/Let's Encrypt certificates are already issued (run certbot first).
#   - The OpenClaw web app is listening on 127.0.0.1:8001.
#   - The Telegram bot runs as a separate process (no nginx involvement).
#
# Deploy:
#   sudo cp nginx/openclaw.conf /etc/nginx/sites-available/openclaw
#   sudo ln -sf /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/openclaw
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS for both apex and www
server {
    listen 80;
    listen [::]:80;
    server_name leeheggan.tech www.leeheggan.tech;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.leeheggan.tech$request_uri;
    }
}

# Redirect apex HTTPS → www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name leeheggan.tech;

    ssl_certificate     /etc/letsencrypt/live/www.leeheggan.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.leeheggan.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.leeheggan.tech$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.leeheggan.tech;

    ssl_certificate     /etc/letsencrypt/live/www.leeheggan.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.leeheggan.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Proxy to the OpenClaw web app
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
